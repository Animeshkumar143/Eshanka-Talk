<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Flames Calculator | Eshanka Talk</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Main CSS -->
<link rel="stylesheet" href="../styles.css">

</head>
<body>

<div class="flames-container">

  <!-- HEADER -->
  <h1>Flames Calculator: Understanding Love Compatibility</h1>

  <p class="flames-desc">
    Discover your relationship status using the classic Flames game.
  </p>


  <!-- FORM -->
  <div class="flames-box" id="formBox">

    <h3>● Calculate your Flames here 🌙</h3>

    <div class="flames-form">

      <label>Your Name *</label>
      <input type="text" id="yourName">

      <label>Your Partner's Name *</label>
      <input type="text" id="partnerName">

      <button id="calcBtn">✨ Calculate our friendship ✨</button>

    </div>

  </div>



  <!-- RESULT -->
  <div class="flames-result" id="resultBox">

    <h2>FLAMES RESULT</h2>

    <h3>
      <span id="youText"></span>
      🔥
      <span id="partnerText"></span>
    </h3>


    <div class="flames-card">

      <div class="flames-icon" id="resultIcon">⚡</div>

      <h1 id="resultTitle"></h1>

      <p id="resultDesc"></p>

    </div>


    <button id="shareBtn">📤 Share it with others</button>

    <button id="againBtn">Calculate Again</button>

  </div>

</div>


<!-- JS -->
<script src="../scripts/Flames.js"></script>
</body>
</html>
