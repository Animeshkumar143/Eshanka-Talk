<!doctype html>

<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pooja Booking | Eshanka Talk</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="../styles.css">

<style>

body{
font-family:Poppins;
background:#f6f6f6;
margin:0;
}

/* HERO */

.pooja-hero{
text-align:center;
padding:40px 0 20px;
}

.pooja-hero h2{
font-size:28px;
}

.search-box{
display:flex;
justify-content:center;
margin-top:15px;
}

.search-box input{
width:350px;
padding:12px;
border:1px solid #ddd;
border-radius:6px 0 0 6px;
}

.search-box button{
background:#ffd400;
border:none;
padding:12px 18px;
border-radius:0 6px 6px 0;
cursor:pointer;
}

/* FILTER */

.filters{
text-align:center;
margin:20px 0;
}

.filters button{
padding:8px 14px;
border-radius:20px;
border:1px solid #ddd;
background:#fff;
margin:4px;
cursor:pointer;
}

.filters button.active{
background:#ffd400;
}

/* GRID */

.pooja-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px 40px;
}

/* CARD */

.pooja-card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
transition:.3s;
}

.pooja-card:hover{
transform:translateY(-6px);
}

.pooja-card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:14px;
}

.card-body h4{
margin:0;
font-size:16px;
}

.price{
color:#2ecc71;
font-weight:600;
margin:6px 0;
}

.card-buttons{
display:flex;
gap:8px;
margin-top:8px;
}

.details-btn{
background:#eee;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.book-btn{
background:#ffd400;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#fff;
padding:25px;
width:420px;
border-radius:10px;
}

.modal-box input,
.modal-box select{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ddd;
border-radius:6px;
}

.confirm-btn{
background:#ffd400;
border:none;
width:100%;
padding:12px;
border-radius:6px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

/* FOOTER */

.site-footer{
background:#111;
color:#fff;
padding:40px 0;
margin-top:40px;
}

.footer-grid{
display:flex;
justify-content:space-around;
}

.footer-bottom{
text-align:center;
margin-top:20px;
opacity:.7;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="site-header">
<div class="container header-inner">

<a class="logo" href="../index.html">
<img src="../assets/logo.png">
<span>Eshanka Talk</span>
</a>

<nav class="nav">
<a href="../Kundli.html">Free Kundli</a>
<a href="../Matching.html">Kundli Matching</a>
<a href="../Horoscope/Horoscope.html">Horoscopes</a>
<a href="../Calculator.html">Calculators</a>
</nav>

<div class="header-actions">
<button class="btn ghost">Login</button>
<button class="btn cta">Talk Now</button>
</div>

</div>
</header>

<!-- HERO -->

<section class="pooja-hero">

<h2>Pooja Services</h2>

<p>Book Online Astrology Pooja Services</p>

<div class="search-box">
<input type="text" placeholder="Search pooja...">
<button><i class="fa fa-search"></i></button>
</div>

</section>

<!-- FILTER -->

<div class="filters">

<button class="active" onclick="filterPooja('all')">All</button> <button onclick="filterPooja('dosh')">Dosh</button> <button onclick="filterPooja('career')">Career</button> <button onclick="filterPooja('marriage')">Marriage</button>

</div>

<!-- GRID -->

<section class="pooja-grid" id="poojaGrid"></section>

<!-- BOOKING MODAL -->

<div class="modal" id="bookingModal">

<div class="modal-box">

<h3>Book Pooja Appointment</h3>

<input type="text" id="custName" placeholder="Your Name">

<input type="text" id="custMobile" placeholder="Mobile Number">

<input type="text" id="custAddress" placeholder="Address / Location">

<label>Select Pandit</label>

<select id="pandit">
<option>Pandit Sharma</option>
<option>Pandit Mishra</option>
<option>Pandit Verma</option>
</select>

<label>Select Date</label>

<input type="date" id="poojaDate">

<label>Select Time</label>

<input type="time" id="poojaTime">

<button class="confirm-btn" onclick="confirmBooking()">
Proceed To Payment
</button>

</div>

</div>

<!-- FOOTER -->

<footer class="site-footer">

<div class="footer-grid">

<div>
<h4>About</h4>
<p>Eshanka Astrology Services</p>
</div>

<div>
<h4>Help</h4>
<p>Payments</p>
<p>Refund Policy</p>
</div>

<div>
<h4>Contact</h4>
<p>contact@eshankatalk.com</p>
</div>

</div>

<div class="footer-bottom">
© 2026 Eshanka Talk
</div>

</footer>

<script>

let selectedPrice=0

const poojas=[

{name:"Mangal Dosh Pooja",price:1500,cat:"dosh",img:"https://images.unsplash.com/photo-1603273578653-2d7c5c75a6b2"},
{name:"Kaal Sarp Dosh Pooja",price:2100,cat:"dosh",img:"https://images.unsplash.com/photo-1594737625785-c1c2d9e24b33"},
{name:"Pitra Dosh Pooja",price:1800,cat:"dosh",img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
{name:"Career Success Pooja",price:1400,cat:"career",img:"https://images.unsplash.com/photo-1604881991720-f91add269bed"},
{name:"Business Growth Pooja",price:1600,cat:"career",img:"https://images.unsplash.com/photo-1524492412937-b28074a5d7da"},
{name:"Job Success Pooja",price:1300,cat:"career",img:"https://images.unsplash.com/photo-1535713875002-d1d0cf377fde"},
{name:"Vivah Pooja",price:2000,cat:"marriage",img:"https://images.unsplash.com/photo-1517487881594-2787fef5ebf7"},
{name:"Love Marriage Pooja",price:1700,cat:"marriage",img:"https://images.unsplash.com/photo-1520813792240-56fc4a3765a7"},
{name:"Relationship Healing Pooja",price:1500,cat:"marriage",img:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"},
{name:"Graha Shanti Pooja",price:1900,cat:"dosh",img:"https://images.unsplash.com/photo-1549887534-4b5d98c593c0"}

]

function renderPooja(list){

const grid=document.getElementById("poojaGrid")

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`

<div class="pooja-card">

<img src="${p.img}">

<div class="card-body">

<h4>${p.name}</h4>

<div class="price">₹ ${p.price}</div>

<div class="card-buttons">

<button class="details-btn">Details</button>

<button class="book-btn" onclick="openBooking(${p.price})">
Book
</button>

</div>

</div>

</div>

`

})

}

renderPooja(poojas)

function filterPooja(cat){

if(cat==="all"){

renderPooja(poojas)

}else{

renderPooja(poojas.filter(p=>p.cat===cat))

}

}

function openBooking(price){

selectedPrice=price

document.getElementById("bookingModal").style.display="flex"

}

function confirmBooking(){

window.location.href="../payment/payment.html?amount="+selectedPrice

}

</script>

</body>
</html>
