<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Astrology Consultation Form | Eshanka Talk</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:Poppins;
}

body{
margin:0;
background:linear-gradient(135deg,#f8f9ff,#eef1ff);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* FORM CONTAINER */

.form-container{
width:720px;
background:#fff;
padding:40px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* TITLE */

.form-title{
font-size:26px;
font-weight:600;
text-align:center;
margin-bottom:10px;
}

.form-sub{
text-align:center;
color:#777;
margin-bottom:30px;
}

/* PROGRESS */

.progress{
height:6px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
}

.progress-bar{
height:6px;
width:20%;
background:#ffd400;
transition:.3s;
}

/* STEP */

.step{
display:none;
animation:fade .4s ease;
}

.step.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* INPUTS */

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
font-size:14px;
margin-bottom:6px;
}

.input-group input,
.input-group select,
.input-group textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
transition:.2s;
}

.input-group input:focus,
.input-group select:focus,
.input-group textarea:focus{
border-color:#ffd400;
box-shadow:0 0 0 3px rgba(255,212,0,.2);
}

/* BUTTONS */

.form-nav{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

.next{
background:#ffd400;
}

.prev{
background:#eee;
}

.submit{
background:#2ecc71;
color:#fff;
}

</style>

</head>

<body>

<div class="form-container">

<div class="form-title">
Astrology Consultation
</div>

<div class="form-sub">
Fill details to generate your astrology report
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="astroForm">

<!-- STEP 1 -->

<div class="step active">

<div class="input-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Email</label>
<input type="email">
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="tel">
</div>

</div>

<!-- STEP 2 -->

<div class="step">

<div class="input-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="input-group">
<label>Time of Birth</label>
<input type="time">
</div>

<div class="input-group">
<label>Birth Place</label>
<input type="text">
</div>

</div>

<!-- STEP 3 -->

<div class="step">

<div class="input-group">
<label>Current City</label>
<input type="text">
</div>

<div class="input-group">
<label>Country</label>
<input type="text">
</div>

</div>

<!-- STEP 4 -->

<div class="step">

<div class="input-group">
<label>Service Type</label>

<select>
<option>Personal Report</option>
<option>Live Session</option>
<option>Monthly Forecast</option>
</select>

</div>

<div class="input-group">
<label>Consultation Mode</label>

<select>
<option>Chat</option>
<option>Call</option>
<option>Video Call</option>
</select>

</div>

</div>

<!-- STEP 5 -->

<div class="step">

<div class="input-group">
<label>Describe your question</label>
<textarea rows="4"></textarea>
</div>

<div class="input-group">
<label>Preferred Date</label>
<input type="date">
</div>

<div class="input-group">
<label>Preferred Time</label>
<input type="time">
</div>

</div>

<div class="form-nav">

<button type="button" class="prev" onclick="changeStep(-1)">
Back
</button>

<button type="button" class="next" onclick="changeStep(1)">
Next
</button>

<button type="submit" class="submit" style="display:none">
Submit & Pay
</button>

</div>

</form>

</div>

<script>

let step=0

const steps=document.querySelectorAll(".step")
const progress=document.getElementById("progressBar")

function showStep(){

steps.forEach((s,i)=>{
s.classList.toggle("active",i===step)
})

progress.style.width=((step+1)/steps.length*100)+"%"

document.querySelector(".prev").style.display=
step===0?"none":"inline-block"

document.querySelector(".next").style.display=
step===steps.length-1?"none":"inline-block"

document.querySelector(".submit").style.display=
step===steps.length-1?"inline-block":"none"

}

function changeStep(n){
step+=n
showStep()
}

showStep()

/* SUBMIT */

document.getElementById("astroForm").addEventListener("submit",function(e){

e.preventDefault()

window.location.href="../payment/payment.html?amount=499"

})

</script>

</body>
</html>
