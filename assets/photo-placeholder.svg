<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <clipPath id="round">
      <rect x="40" y="40" width="720" height="520" rx="12" ry="12" />
    </clipPath>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#f6fbff"/>
  <!-- embedded provided image as the placeholder content -->
  <g clip-path="url(#round)">
    <image href="https://aws.astrotalk.com/images/57100ece-4afe-4c52-aeea-47f1f43fe424.png" x="40" y="40" width="720" height="520" preserveAspectRatio="xMidYMid slice" />
  </g>
  <!-- soft frame -->
  <rect x="40" y="40" width="720" height="520" rx="12" ry="12" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2" />
</svg>